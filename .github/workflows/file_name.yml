name: check the commits
on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to start it manually for testing

jobs:
  make-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Dynamic Commits
        run: |
          git config --global user.name "HemmatQachmas"
          git config --global user.email "qachmnas.aslam@gmail.com"

          # Generate a random number between 400 and 600
          # Formula: (Random % (Max - Min + 1)) + Min
          NUM_COMMITS=$(( ( RANDOM % 2 ) + 5 ))

          echo "Starting $NUM_COMMITS dynamic commits today..."

          for ((i=1; i<=NUM_COMMITS; i++))
          do
            echo "Dynamic Commit #$i on $(date)" >> commit_log.txt
            git add commit_log.txt
            git commit -m "Automated dynamic commit $i of $NUM_COMMITS [skip ci]"
          done
          git push
